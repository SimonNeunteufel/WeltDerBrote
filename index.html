<script src="./assets/js/util.js"></script>
    <script>
    (async () => {
        try {
            // Wir laden BEIDE Dateien parallel
            const [rezepteData, wissenData] = await Promise.all([
                window.$util.loadCsv('./assets/data/wdb_rezepte.csv'),
                window.$util.loadCsv('./assets/data/wdb_wissen.csv')
            ]);
            
            // --- 1. Rezepte zählen (Unique IDs via Set) ---
            const broteSet = new Set();
            const gerichteSet = new Set();
            const basicsSet = new Set(); // Starter aus der Rezept-DB (-B-)

            rezepteData.forEach(r => {
                if (!r.brot_id) return;
                const id = r.brot_id.trim();
                
                // Wir zählen Unique IDs, damit Steps nicht doppelt zählen
                if (id.includes('-G-')) broteSet.add(id);
                else if (id.includes('-R-')) gerichteSet.add(id);
                else if (id.includes('-B-')) basicsSet.add(id);
            });

            // --- 2. Wissen zählen (aus wdb_wissen.csv) ---
            let mehlCount = 0;
            let technikCount = 0;
            let wissenTreibmittelCount = 0; // Falls Hefe/Salz im Lexikon stehen

            wissenData.forEach(w => {
                // Wir schauen auf die Spalte 'kategorie'
                const kat = (w.kategorie || "").trim();
                
                if (kat === 'Mehl' || kat === 'Getreide') mehlCount++;
                else if (kat === 'Technik' || kat === 'Methode') technikCount++;
                else if (kat === 'Triebmittel') wissenTreibmittelCount++;
            });

            // Treibmittel kombinieren (Aktive Starter aus Rezepten + Passive Infos aus Wissen)
            const totalTreibmittel = basicsSet.size + wissenTreibmittelCount;

            // --- 3. Ausgabe ---
            const statsDiv = document.getElementById('stats');
            
            statsDiv.innerHTML = `
                <div style="margin-bottom:8px; font-weight:bold; color:#5d4037;">Aktueller Datenbank-Bestand:</div>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;">
                    <span class="badge-stat" style="border:1px solid #ddd; padding:5px 10px; border-radius:15px; background:white;">
                        <b style="color:#d84315;">${broteSet.size}</b> Brote & Teige
                    </span>
                    <span class="badge-stat" style="border:1px solid #ddd; padding:5px 10px; border-radius:15px; background:white;">
                        <b style="color:#d84315;">${gerichteSet.size}</b> Gerichte
                    </span>
                    <span class="badge-stat" style="border:1px solid #ddd; padding:5px 10px; border-radius:15px; background:white;">
                        <b style="color:#d84315;">${totalTreibmittel}</b> Treibmittel & Starter
                    </span>
                    <span class="badge-stat" style="border:1px solid #ddd; padding:5px 10px; border-radius:15px; background:white;">
                        <b style="color:#d84315;">${mehlCount}</b> Mehle
                    </span>
                    <span class="badge-stat" style="border:1px solid #ddd; padding:5px 10px; border-radius:15px; background:white;">
                        <b style="color:#d84315;">${technikCount}</b> Techniken
                    </span>
                </div>
            `;

        } catch (e) { 
            console.error(e);
            document.getElementById('stats').textContent = 'Datenbank wird geladen oder ist leer...'; 
        }
    })();
    </script>
