<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WdB – Rezeptansicht</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* --- Grundlayout & Reset --- */
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #f4f7f6; color: #333; height: 100vh; overflow: hidden; }
        .btn { padding: 8px 15px; background: #4e342e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; text-decoration: none; display: inline-block;}
        .btn:hover { background: #6d4c41; }

        /* --- Hauptcontainer für Zweispaltiges Layout --- */
        .app-layout {
            display: flex;
            height: 100%; width: 100%;
        }

        /* --- Sidebar (Links) --- */
        .sidebar {
            width: 260px; background: white; border-right: 1px solid #e0e0e0;
            display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
        }
        .sidebar-top { padding: 20px; border-bottom: 1px solid #eee; background: #fafafa; }
        .sidebar-scroll { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .sidebar-header { font-weight: bold; margin-bottom: 15px; color: #4e342e; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px;}
        .sidebar-list { list-style: none; padding: 0; margin: 0; }
        .sidebar-list li { margin-bottom: 5px; }
        /* Links in der Sidebar sind jetzt Buttons, keine Anker mehr */
        .sidebar-list a {
            text-decoration: none; color: #555; display: block; padding: 10px 12px;
            border-radius: 6px; transition: all 0.2s; font-size: 0.95em; border-left: 3px solid transparent;
            cursor: pointer; /* Zeigt an, dass es klickbar ist */
        }
        .sidebar-list a:hover { background: #f0f0f0; color: #000; }
        .sidebar-list a.active { background: #eef2f6; color: #4e342e; font-weight: bold; border-left-color: #4e342e;}


        /* --- Content Bereich (Rechts) --- */
        .main-content {
            flex-grow: 1; overflow-y: auto; padding: 40px;
            position: relative; background: #f4f7f6;
            /* Scroll-Behavior entfernt, da wir jetzt hart umschalten */
        }

        /* --- Das eigentliche Rezept-Blatt --- */
        .recipe-sheet {
            background: white; padding: 50px; border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
            /* Margin bottom reduziert, da eh nur eins angezeigt wird */
            margin-bottom: 40px;
            max-width: 950px; margin-left: auto; margin-right: auto;
        }

        /* --- Rezept Details CSS (Unverändert) --- */
        .phase-section { margin-bottom: 50px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        .phase-section:last-child { border-bottom: none; }
        .phase-title { background: #4e342e; color: white; padding: 8px 15px; border-radius: 4px; display: inline-block; margin-bottom: 25px; font-weight: bold; font-size: 0.95em; }
        .recipe-grid { display: grid; grid-template-columns: 320px 1fr; gap: 40px; }
        .ing-box { background: #fafafa; padding: 25px; border-radius: 8px; border: 1px solid #eee; align-self: start; }
        .ing-list { list-style: none; padding: 0; margin: 0; }
        .ing-list li { padding: 8px 0; border-bottom: 1px dotted #ccc; font-size: 0.95em; display: flex; justify-content: space-between; }
        .step-text { font-size: 1.15em; line-height: 1.7; color: #333; }
        .tech-badge { background: #eef2f6; color: #4e342e; padding: 4px 10px; border-radius: 12px; font-size: 0.85em; margin-right: 5px; border: 1px solid #d1d5db; display: inline-block; margin-top: 8px; }
        .meta-info { text-align:center; margin-bottom:50px; padding-bottom: 30px; border-bottom: 2px solid #eee; }
        .cat-tag { text-transform: uppercase; letter-spacing: 1px; color: #888; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; display: block;}
        .recipe-title { font-size: 2.8em; margin: 0 0 15px 0; color: #2c1810; }

        /* --- Bilder im Rezept & Overlay (Unverändert) --- */
        .instruction-box img {
            max-width: 100%; height: auto; border-radius: 8px; display: block; margin-top: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: zoom-in; transition: transform 0.2s;
            border: 1px solid #eee;
        }
        .instruction-box img:hover { transform: scale(1.02); }
        #imageOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            justify-content: center; align-items: center; padding: 40px;
            cursor: zoom-out; backdrop-filter: blur(5px);
        }
        #imageOverlay.active { display: flex; animation: fadeIn 0.2s ease-out; }
        #overlayImage {
            max-width: 100%; max-height: 100%; box-shadow: 0 5px 30px rgba(0,0,0,0.5); border-radius: 4px;
            object-fit: contain; transform: scale(0.95); transition: transform 0.3s ease-out;
        }
        #imageOverlay.active #overlayImage { transform: scale(1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }


        /* --- Floating Nav Buttons (Prev/Next unten rechts) --- */
        .floating-nav {
            position: fixed; bottom: 30px; right: 40px;
            background: white; padding: 8px; border-radius: 50px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15); display: flex; gap: 10px; z-index: 100;
            border: 1px solid #eee;
        }
        .nav-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid #eee;
            background: #f9f9f9; color: #333; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.4em;
             text-decoration: none; transition: all 0.2s;
             /* Wichtig: Keine Standard-Link-Interaktion mehr, da per JS gesteuert */
             user-select: none; 
        }
        .nav-btn:hover { background: #4e342e; color: white; border-color: #4e342e; transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        /* Deaktivierter Zustand */
        .nav-btn.disabled { opacity: 0.4; cursor: default; pointer-events: none; background: #eee; color: #aaa; border-color: #eee; box-shadow: none; transform: none;}


        /* --- Print & Mobile Styles (Unverändert) --- */
        @media print {
            .no-print, .sidebar, .floating-nav { display: none !important; }
            body, .app-layout, .main-content { height: auto; overflow: visible; display: block; background: white; padding: 0; margin: 0;}
            .recipe-sheet { box-shadow: none; margin: 0; padding: 0; border-radius: 0; page-break-after: always; max-width: none; border: none;}
            .recipe-grid { display: block; }
            .ing-box { margin-bottom: 20px; border: 1px solid #ccc; page-break-inside: avoid; background: none;}
            .phase-section { page-break-inside: avoid; }
        }
        @media (max-width: 900px) {
            .app-layout { flex-direction: column; height: auto; overflow: visible;}
            body { height: auto; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e0e0e0; }
            .sidebar-scroll { max-height: 200px; }
            .main-content { padding: 20px; }
            .recipe-sheet { padding: 25px; margin-bottom: 40px; }
            .recipe-grid { grid-template-columns: 1fr; gap: 20px; }
            .floating-nav { bottom: 20px; right: 20px; padding: 5px; }
            .nav-btn { width: 40px; height: 40px; font-size: 1.2em; }
        }
    </style>
</head>
<body>

<div id="imageOverlay" class="no-print">
    <img id="overlayImage" src="" alt="Großansicht">
</div>

<div class="app-layout">
    <aside class="sidebar no-print">
        <div class="sidebar-top">
             <a href="./rezepte.html" class="btn" style="width:100%; text-align:center;">← Zurück zur Liste</a>
        </div>
        <div class="sidebar-scroll">
            <div class="sidebar-header">Ausgewählte Rezepte</div>
            <ul id="sidebarLinkList" class="sidebar-list">
                </ul>
        </div>
    </aside>

    <main class="main-content" id="mainContentArea">
        <div class="floating-nav no-print">
            <a id="navPrev" class="nav-btn disabled" title="Vorheriges Rezept">←</a>
            <a href="javascript:window.print()" class="nav-btn" title="Drucken" style="font-size: 1.1em;">🖨️</a>
            <a id="navNext" class="nav-btn disabled" title="Nächstes Rezept">→</a>
        </div>

        <div id="recipeContainer">
            <div style="text-align: center; color: #666; padding: 50px; font-size: 1.2em;">Lade Rezept...</div>
        </div>
    </main>
</div>


<script src="./assets/js/util.js"></script> 
<script>
(async () => {
    // --- Initialisierung & Referenzen ---
    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');
    const recipeContainer = document.getElementById('recipeContainer');
    const sidebarList = document.getElementById('sidebarLinkList');
    const overlay = document.getElementById('imageOverlay');
    const overlayImage = document.getElementById('overlayImage');
    const navPrev = document.getElementById('navPrev');
    const navNext = document.getElementById('navNext');
    const mainContentArea = document.getElementById('mainContentArea');

    if (!idParam) {
        recipeContainer.innerHTML = "<p style='text-align:center; color:red; padding:50px;'>Keine Rezepte ausgewählt.</p>";
        return;
    }

    // Liste aller angeforderten IDs
    const allIds = idParam.split(',').map(s => s.trim()).filter(Boolean);
    let currentRecipeIndex = 0; // Starten beim ersten Rezept

    // CSV laden
    const allData = await window.$util.loadCsv('./assets/data/wdb_rezepte.csv');

    // --- 1. Sidebar Liste einmalig aufbauen ---
    let sidebarHtml = "";
    allIds.forEach((breadId, index) => {
        // Name des Rezepts finden (aus dem ersten Schritt)
        const firstStep = allData.find(r => r.brot_id === breadId);
        const recipeName = firstStep ? (firstStep.name || breadId) : `${breadId} (Nicht gefunden)`;
        
        // Link hat kein href="#" mehr, sondern ein data-index Attribut
        sidebarHtml += `<li><a class="sidebar-link" data-index="${index}">${recipeName}</a></li>`;
    });
    sidebarList.innerHTML = sidebarHtml;


    // --- 2. Kernfunktion: Ein spezifisches Rezept anzeigen ---
    window.showRecipe = (index) => {
        if (index < 0 || index >= allIds.length) return; // Index out of bounds check
        
        currentRecipeIndex = index;
        const breadId = allIds[index];
        
        // A) Daten filtern
        const steps = allData.filter(r => r.brot_id === breadId);
        
        if (steps.length === 0) {
            recipeContainer.innerHTML = `<div class="recipe-sheet"><p style='color:red'>Rezept-ID "${breadId}" nicht in der Datenbank gefunden.</p></div>`;
            updateUIState();
            return;
        }

        // B) HTML generieren (nur für dieses eine Rezept)
        steps.sort((a, b) => parseInt(a.schritt_nr || 0) - parseInt(b.schritt_nr || 0));
        const mainInfo = steps[0];
        const recipeName = mainInfo.name || breadId;

        let breadHtml = `
            <div class="recipe-sheet">
                <div class="meta-info">
                    <span class="cat-tag">${mainInfo.atlas_ref_id || mainInfo.gruppe || 'Rezept'}</span>
                    <h1 class="recipe-title">${recipeName}</h1>
                    <div style="font-family:monospace; color:#666; margin-bottom: 10px;">ID: ${breadId}</div>
                    ${mainInfo.quelle ? `<div style="font-size:0.9em; color:#888;">Quelle: ${mainInfo.quelle}</div>` : ''}
                </div>
        `;

        steps.forEach((s, stepIndex) => {
            let fullText = s.anweisung || '';
            let stepTitle = s.schritt_name || `Schritt ${s.schritt_nr || stepIndex + 1}`;
            let stepBody = fullText;
            const splitIndex = fullText.indexOf(':');
            if (splitIndex > -1 && splitIndex < 50 && !s.schritt_name) {
                stepTitle = fullText.substring(0, splitIndex).trim();
                stepBody = fullText.substring(splitIndex + 1).trim();
            }

            breadHtml += `
                <div class="phase-section">
                    <div class="phase-title">${stepTitle}</div>
                    <div class="recipe-grid">
                        <div class="ing-box">
                            <h3 style="margin-top:0; font-size:1.1em; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">Zutaten</h3>
                            <ul class="ing-list">${window.$util.formatIngredients(s.zutaten_list)}</ul>
                            ${s.zeit_aufwand ? `<div style="margin-top:20px; font-size:0.95em; color:#555; border-top:1px solid #eee; padding-top:15px; display:flex; align-items:center;"><span style="font-size:1.2em; margin-right:8px;">⏱</span> ${s.zeit_aufwand}</div>` : ''}
                        </div>
                        <div class="instruction-box">
                            <h3 style="margin-top:0; font-size:1.1em; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">Anweisung</h3>
                            <div class="step-text">${stepBody || 'Keine Anweisung.'}</div>
                            <div style="margin-top:20px;">${window.$util.parsePipe(s.techniken_tags).map(t => `<span class="tech-badge">${t}</span>`).join('')}</div>
                            ${s.bild_ref ? `<div><img src="./assets/image/${s.bild_ref}" alt="${stepTitle}" onerror="this.style.display='none'"></div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        breadHtml += `</div>`;

        // C) Inhalt austauschen und nach oben scrollen
        recipeContainer.innerHTML = breadHtml;
        mainContentArea.scrollTop = 0;

        // D) UI Status aktualisieren (Buttons & Sidebar)
        updateUIState();
    };


    // --- 3. Hilfsfunktion: UI Status aktualisieren ---
    function updateUIState() {
        // Sidebar Links: Klasse 'active' setzen
        document.querySelectorAll('.sidebar-link').forEach(link => {
            // Prüfen, ob der data-index dieses Links dem aktuellen Index entspricht
            if (parseInt(link.dataset.index) === currentRecipeIndex) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });

        // Prev/Next Buttons: aktivieren/deaktivieren
        // Zurück-Button
        if (currentRecipeIndex > 0) {
            navPrev.classList.remove('disabled');
        } else {
            navPrev.classList.add('disabled');
        }
        // Vorwärts-Button
        if (currentRecipeIndex < allIds.length - 1) {
            navNext.classList.remove('disabled');
        } else {
            navNext.classList.add('disabled');
        }
    }


    // --- 4. Event Listener für Navigation ---

    // Klick auf Sidebar-Links (Event Delegation)
    sidebarList.addEventListener('click', (e) => {
        // Prüfen, ob ein Element mit der Klasse 'sidebar-link' geklickt wurde
        const link = e.target.closest('.sidebar-link');
        if (link) {
            // Den Index aus dem data-Attribut holen und anzeigen
            const index = parseInt(link.dataset.index);
            showRecipe(index);
        }
    });

    // Klick auf Prev/Next Buttons
    navPrev.addEventListener('click', () => {
        if (currentRecipeIndex > 0) {
            showRecipe(currentRecipeIndex - 1);
        }
    });

    navNext.addEventListener('click', () => {
        if (currentRecipeIndex < allIds.length - 1) {
            showRecipe(currentRecipeIndex + 1);
        }
    });


    // --- 5. Image Overlay Logik (Unverändert) ---
    recipeContainer.addEventListener('click', (e) => {
        if (e.target.tagName === 'IMG' && e.target.closest('.instruction-box')) {
            overlayImage.src = e.target.src;
            overlay.classList.add('active');
        }
    });
    overlay.addEventListener('click', () => overlay.classList.remove('active'));


    // --- 6. Start: Erstes Rezept anzeigen ---
    if (allIds.length > 0) {
        showRecipe(0);
    }

})();
</script>
</body>
</html>
