<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WdB – Rezeptsuche</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .table-wrap { max-height: calc(100vh - 250px); overflow: auto; border: 1px solid #eee; border-radius: 8px; }
        #t { width: 100%; border-collapse: collapse; background: white; }
        #t th { position: sticky; top: 0; background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; z-index: 10; }
        #t td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        #t tr:hover { background-color: #fff9f0; cursor: pointer; }
        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status-active { background: #d1fae5; color: #065f46; } /* Grün für active */
        .status-draft { background: #f3f4f6; color: #374151; }  /* Grau für draft */
    </style>
</head>
<body class="BG_Brot_Suche">
    <div class="page">
        <div class="header">
            <button class="btn" onclick="location.href='./index.html'">← Home</button>
            <div class="brand">Rezepte-Finder</div>
            <nav class="nav">
                <a href="./baender.html">Bände</a>
                <a href="./rezepte.html" class="active">Rezepte</a>
            </nav>
        </div>

        <div class="toolbar">
            <input id="q" placeholder="Brotname, Mehl oder Technik suchen..." type="search" style="flex-grow:1; padding: 10px;">
            <button class="btn" id="go">Suchen</button>
        </div>

        <div class="table-wrap">
            <table id="t">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Kategorie / Band</th>
                        <th>Status</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody id="recipeBody"></tbody>
            </table>
        </div>
    </div>

    <script src="./assets/js/util.js"></script>
    <script>
    (async () => {
        const data = await window.$util.loadCsv('./assets/data/wdb_rezepte.csv');
        const tbody = document.getElementById('recipeBody');
        
        // --- NEUE LOGIK: Daten aggregieren ---
        // Wir fassen alle Zeilen eines Brotes zusammen, damit die Suche
        // auch Zutaten findet, die erst in Schritt 3 stehen.
        const grouped = {};

        data.forEach(row => {
            const id = row.brot_id;
            if (!id) return; // Leere Zeilen überspringen

            if (!grouped[id]) {
                // Wenn wir das Brot zum ersten Mal sehen, legen wir den Haupteintrag an
                grouped[id] = {
                    ...row, // Nimm alle Daten der ersten Zeile (Name, Status etc.)
                    searchContent: "" // Hier sammeln wir allen Text für die Suche
                };
            }
            
            // Wir fügen den Text JEDER Zeile zum Such-Index dieses Brotes hinzu
            // (Zutaten, Anweisungen aller Schritte)
            grouped[id].searchContent += " " + Object.values(row).join(" ").toLowerCase();
        });

        // Aus dem Objekt wieder ein Array machen für die Tabelle
        const uniqueRecipes = Object.values(grouped);

        const render = (list) => {
            if(list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">Keine Rezepte gefunden.</td></tr>';
                return;
            }

            tbody.innerHTML = list.map(r => `
                <tr onclick="location.href='./rezept_ansicht.html?id=${r.brot_id}'">
                    <td class="col-id">${r.brot_id}</td>
                    <td><b>${r.name || 'Unbenanntes Brot'}</b></td>
                    <td><small>${r.atlas_ref_id || r.gruppe || ''}</small></td>
                    <td><span class="badge-status status-${(r.status || 'draft').toLowerCase()}">${r.status || 'Draft'}</span></td>
                    <td><button class="btn-sm">Ansehen</button></td>
                </tr>
            `).join('');
        };

        // Live Suche
        document.getElementById('q').oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = uniqueRecipes.filter(r => 
                // Wir suchen im gesammelten "searchContent", nicht nur im Namen
                r.searchContent.includes(query)
            );
            render(filtered);
        };

        // Initial rendern (Alle anzeigen)
        render(uniqueRecipes);
    })();
    </script>
</body>
</html>
