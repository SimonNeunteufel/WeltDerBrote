<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WdB – Rezeptsuche</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .table-wrap { max-height: calc(100vh - 250px); overflow: auto; border: 1px solid #eee; border-radius: 8px; }
        #t { width: 100%; border-collapse: collapse; background: white; }
        #t th { position: sticky; top: 0; background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; z-index: 10; }
        #t td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        #t tr:hover { background-color: #fff9f0; cursor: pointer; }
        
        /* Checkbox Styles */
        .check-col { width: 40px; text-align: center; }
        input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }

        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-draft { background: #f3f4f6; color: #374151; }

        /* Action Bar unten (fixiert) */
        #selectionBar {
            position: fixed; bottom: -100px; left: 0; right: 0;
            background: #4e342e; color: white;
            padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            transition: bottom 0.3s ease;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }
        #selectionBar.visible { bottom: 0; }
        .btn-white { background: white; color: #4e342e; border: none; font-weight: bold; }
        .btn-white:hover { background: #eee; }
    </style>
</head>
<body class="BG_Brot_Suche">
    <div class="page" style="padding-bottom: 80px;"> <div class="header">
            <button class="btn" onclick="location.href='./index.html'">← Home</button>
            <div class="brand">Rezepte-Finder</div>
            <nav class="nav">
                <a href="./baender.html">Bände</a>
                <a href="./rezepte.html" class="active">Rezepte</a>
            </nav>
        </div>

        <div class="toolbar">
            <input id="q" placeholder="Suche nach Brot, Mehl, Technik..." type="search" style="flex-grow:1; padding: 10px;">
        </div>

        <div class="table-wrap">
            <table id="t">
                <thead>
                    <tr>
                        <th class="check-col"><input type="checkbox" id="selectAll" title="Alle auswählen"></th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Kategorie / Band</th>
                        <th>Status</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody id="recipeBody"></tbody>
            </table>
        </div>
    </div>

    <div id="selectionBar">
        <div>
            <span id="countDisplay" style="font-size: 1.1em; font-weight: bold; margin-right: 10px;">0</span>
            Rezepte ausgewählt
        </div>
        <button class="btn btn-white" onclick="viewSelected()">Auswahl ansehen / Drucken</button>
    </div>

    <script src="./assets/js/util.js"></script>
    <script>
    (async () => {
        const data = await window.$util.loadCsv('./assets/data/wdb_rezepte.csv');
        const tbody = document.getElementById('recipeBody');
        const selectAllBox = document.getElementById('selectAll');
        const selectionBar = document.getElementById('selectionBar');
        const countDisplay = document.getElementById('countDisplay');
        
        // Daten aggregieren (wie vorher)
        const grouped = {};
        data.forEach(row => {
            const id = row.brot_id;
            if (!id) return;
            if (!grouped[id]) {
                grouped[id] = { ...row, searchContent: "" };
            }
            grouped[id].searchContent += " " + Object.values(row).join(" ").toLowerCase();
        });
        const uniqueRecipes = Object.values(grouped);

        // State für Suche
        let currentList = uniqueRecipes; 

        const render = (list) => {
            currentList = list; // Speichern, welche Liste gerade sichtbar ist
            if(list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">Keine Rezepte gefunden.</td></tr>';
                return;
            }

            tbody.innerHTML = list.map(r => `
                <tr>
                    <td class="check-col">
                        <input type="checkbox" class="recipe-check" value="${r.brot_id}">
                    </td>
                    <td onclick="openOne('${r.brot_id}')" class="col-id">${r.brot_id}</td>
                    <td onclick="openOne('${r.brot_id}')"><b>${r.name || 'Unbenannt'}</b></td>
                    <td onclick="openOne('${r.brot_id}')"><small>${r.atlas_ref_id || r.gruppe || ''}</small></td>
                    <td onclick="openOne('${r.brot_id}')"><span class="badge-status status-${(r.status || 'draft').toLowerCase()}">${r.status || 'Draft'}</span></td>
                    <td><button class="btn-sm" onclick="openOne('${r.brot_id}')">Ansehen</button></td>
                </tr>
            `).join('');

            // Events für die neuen Checkboxen registrieren
            document.querySelectorAll('.recipe-check').forEach(cb => {
                cb.addEventListener('change', updateSelectionUI);
            });
        };

        // Hilfsfunktion: Klick auf Zeile öffnet Einzelansicht
        window.openOne = (id) => location.href = `./rezept_ansicht.html?id=${id}`;

        // UI Update Logik
        const updateSelectionUI = () => {
            const checkedBoxes = document.querySelectorAll('.recipe-check:checked');
            const count = checkedBoxes.length;
            
            countDisplay.innerText = count;
            if (count > 0) {
                selectionBar.classList.add('visible');
            } else {
                selectionBar.classList.remove('visible');
                selectAllBox.checked = false;
            }
        };

        // "Alle Auswählen" Logik
        selectAllBox.addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            document.querySelectorAll('.recipe-check').forEach(cb => {
                // Nur sichtbare Checkboxen togglen
                cb.checked = isChecked;
            });
            updateSelectionUI();
        });

        // Funktion für den Button unten "Auswahl ansehen"
        window.viewSelected = () => {
            const checkedBoxes = document.querySelectorAll('.recipe-check:checked');
            const ids = Array.from(checkedBoxes).map(cb => cb.value);
            
            if (ids.length === 0) return;
            
            // IDs mit Komma getrennt übergeben
            location.href = `./rezept_ansicht.html?id=${ids.join(',')}`;
        };

        // Suchfunktion
        document.getElementById('q').oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = uniqueRecipes.filter(r => r.searchContent.includes(query));
            render(filtered);
            // Bei neuer Suche Auswahl zurücksetzen oder beibehalten? 
            // Hier resetten wir die "Alle" Checkbox visuell
            selectAllBox.checked = false;
        };

        render(uniqueRecipes);
    })();
    </script>
</body>
</html>
