<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WdB – Rezeptansicht</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .recipe-container { max-width: 1000px; margin: 30px auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .phase-section { margin-bottom: 40px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }
        .phase-title { background: #4e342e; color: white; padding: 8px 15px; border-radius: 4px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        .recipe-grid { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        .ing-box { background: #fafafa; padding: 20px; border-radius: 6px; border: 1px solid #eee; }
        .ing-list { list-style: none; padding: 0; }
        .ing-list li { padding: 5px 0; border-bottom: 1px dotted #ccc; font-size: 0.95em; }
        .step-text { font-size: 1.1em; line-height: 1.7; color: #333; white-space: pre-line; } /* pre-line erhält Zeilenumbrüche */
        .tech-badge { background: #eef2f6; color: #4e342e; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; margin-right: 5px; border: 1px solid #d1d5db; display: inline-block; margin-top: 5px; }
        .meta-info { text-align:center; margin-bottom:40px; }
        @media print { .no-print { display: none; } .recipe-container { box-shadow: none; margin: 0; padding: 0; } .recipe-grid { display: block; } .ing-box { margin-bottom: 20px; page-break-inside: avoid; } }
        @media (max-width: 768px) { .recipe-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="no-print" style="max-width:1000px; margin:20px auto; display:flex; justify-content:space-between; padding: 0 10px;">
    <button class="btn" onclick="history.back()">← Zurück</button>
    <button class="btn" onclick="window.print()">Drucken / PDF</button>
</div>

<div id="recipeOutput" class="recipe-container">
    <div style="text-align: center; color: #666; padding: 50px;">Lade Rezept...</div>
</div>

<script src="./assets/js/util.js"></script>
<script>
(async () => {
    // 1. ID aus der URL holen (?id=...)
    const params = new URLSearchParams(window.location.search);
    const breadId = params.get('id');

    if (!breadId) {
        document.getElementById('recipeOutput').innerHTML = "<p style='text-align:center; color:red'>Fehler: Keine ID übergeben.</p>";
        return;
    }

    // 2. CSV laden
    const allData = await window.$util.loadCsv('./assets/data/wdb_rezepte.csv');
    
    // 3. Zeilen für dieses spezifische Brot filtern (brot_id)
    const steps = allData.filter(r => r.brot_id === breadId);

    if (steps.length === 0) {
        document.getElementById('recipeOutput').innerHTML = `<p style='text-align:center'>Rezept mit ID "<b>${breadId}</b>" nicht gefunden.</p>`;
        return;
    }

    // 4. Schritte sortieren (nach schritt_nr), damit die Reihenfolge stimmt
    steps.sort((a, b) => parseInt(a.schritt_nr || 0) - parseInt(b.schritt_nr || 0));

    // Kopfdaten aus der ersten Zeile nehmen
    const mainInfo = steps[0];
    
    // HTML zusammenbauen
    let html = `
        <div class="meta-info">
            <small style="color:#888; letter-spacing:2px; text-transform:uppercase;">${mainInfo.atlas_ref_id || ''}</small>
            <h1 style="font-size:3em; margin:10px 0; line-height: 1.1;">${mainInfo.name || 'Unbenanntes Brot'}</h1>
            <div style="font-style:italic; color:#666;">ID: ${breadId}</div>
            ${mainInfo.quelle ? `<div style="margin-top:8px; font-size:0.85em; color:#888;">Quelle: ${mainInfo.quelle}</div>` : ''}
        </div>
    `;

    // 5. Durch alle Schritte/Phasen iterieren
    steps.forEach(s => {
        html += `
            <div class="phase-section">
                <div class="phase-title">${s.gruppe || 'Zubereitungsschritt'}</div>
                
                <div class="recipe-grid">
                    <div class="ing-box">
                        <h3 style="margin-top:0;">Zutaten</h3>
                        <ul class="ing-list">
                            ${window.$util.formatIngredients(s.zutaten_list)}
                        </ul>
                        ${s.zeit_aufwand ? `<div style="margin-top:15px; font-size:0.9em; color:#666; border-top:1px solid #ddd; padding-top:10px;">⏱ <b>Zeit:</b> ${s.zeit_aufwand}</div>` : ''}
                    </div>

                    <div class="instruction-box">
                        <h3 style="margin-top:0;">Anweisung</h3>
                        <div class="step-text">${s.anweisung || 'Keine Anweisung hinterlegt.'}</div>
                        
                        <div style="margin-top:20px;">
                            ${window.$util.parsePipe(s.techniken_tags).map(t => `<span class="tech-badge">${t}</span>`).join('')}
                        </div>
                        
                        ${s.bild_ref ? `<div style="margin-top:20px;"><img src="./assets/img/${s.bild_ref}" style="max-width:100%; border-radius:6px;" alt="Bild zum Schritt"></div>` : ''}
                    </div>
                </div>
            </div>
        `;
    });

    document.getElementById('recipeOutput').innerHTML = html;
})();
</script>
</body>
</html>
