<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WdB – Rezeptansicht</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* --- GRUNDLAYOUT (Analog zu Mischungen/Stoffe) --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #f4f7f6; 
            color: #333; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* --- SIDEBAR (LINKS) --- */
        .sidebar {
            width: 300px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: #fafafa;
        }
        .btn-back {
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; color: #4e342e; font-weight: 600;
            font-size: 0.95em; padding: 10px 15px; border-radius: 6px;
            transition: background 0.2s; cursor: pointer; border: 1px solid #d7ccc8; background: white;
            justify-content: center;
        }
        .btn-back:hover { background: #efebe9; }

        .recipe-list {
            list-style: none; padding: 0; margin: 0;
            overflow-y: auto; flex-grow: 1;
        }
        .list-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: all 0.2s;
            color: #555; font-size: 0.95em;
        }
        .list-item:hover { background: #fff8e1; color: #000; padding-left: 25px; }
        .list-item.active {
            background: #efebe9; 
            border-left: 4px solid #4e342e;
            padding-left: 16px;
            font-weight: bold; color: #4e342e;
        }

        /* --- MAIN CONTENT (RECHTS) --- */
        .main-view {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
            position: relative;
        }

        .top-bar {
            display: flex; justify-content: flex-end; margin-bottom: 20px; max-width: 950px; margin-left: auto; margin-right: auto;
        }
        .btn-print {
            background: #4e342e; color: white; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 5px rgba(78, 52, 46, 0.3);
        }
        .btn-print:hover { background: #3e2723; }

        /* --- REZEPT BLATT DESIGN (Brot Spezifisch) --- */
        .recipe-sheet {
            background: white; padding: 50px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin: 0 auto 60px auto;
            max-width: 950px;
        }

        .meta-info { text-align:center; margin-bottom:50px; padding-bottom: 30px; border-bottom: 2px solid #eee; }
        .cat-tag { text-transform: uppercase; letter-spacing: 1px; color: #888; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; display: block;}
        .recipe-title { font-size: 2.5em; margin: 0 0 10px 0; color: #2c1810; line-height: 1.2; }

        .phase-section { margin-bottom: 50px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        .phase-section:last-child { border-bottom: none; }
        .phase-title { background: #4e342e; color: white; padding: 6px 12px; border-radius: 4px; display: inline-block; margin-bottom: 20px; font-weight: bold; font-size: 0.9em; }
        
        .recipe-grid { display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
        
        .ing-box { background: #fafafa; padding: 20px; border-radius: 8px; border: 1px solid #eee; align-self: start; }
        .ing-list { list-style: none; padding: 0; margin: 0; }
        .ing-list li { padding: 6px 0; border-bottom: 1px dotted #ccc; font-size: 0.95em; display: flex; justify-content: space-between; }
        
        .step-text { font-size: 1.1em; line-height: 1.6; color: #333; }
        .tech-badge { background: #efebe9; color: #4e342e; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; margin-right: 5px; border: 1px solid #d7ccc8; display: inline-block; margin-top: 8px; }

        .instruction-box img {
            max-width: 100%; height: auto; border-radius: 8px; display: block; margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: zoom-in; border: 1px solid #eee;
        }

        /* --- NAVIGATION UNTEN (Unified) --- */
        #nav-float { 
            position: fixed; bottom: 20px; left: 50%; 
            transform: translateX(-50%); 
            background: white; padding: 8px 20px; border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 1px solid #ddd;
            display: flex; gap: 15px; z-index: 50; align-items: center; 
        }
        #nav-float button { 
            padding: 8px 16px; cursor: pointer; border: none; background: #4e342e; color: white; 
            border-radius: 20px; font-size: 0.9em; font-weight: 600; transition: background 0.2s;
        }
        #nav-float button:hover { background: #3e2723; }
        #nav-float button:disabled { background: #ccc; cursor: default; }

        /* --- LIGHTBOX --- */
        .lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; box-shadow: 0 0 30px rgba(0,0,0,0.5); cursor: zoom-out; }

        /* --- RESPONSIVE / MOBILE (IPHONE) --- */
        @media (max-width: 900px) {
            body { 
                flex-direction: column; /* Stack vertically */
                height: auto; 
                overflow-y: auto; /* Scroll body */
            }
            .sidebar { 
                width: 100%; 
                height: auto; 
                border-right: none; 
                border-bottom: 1px solid #ccc; 
            }
            .recipe-list {
                max-height: 180px; /* Liste begrenzen, damit sie nicht alles verdeckt */
                overflow-y: auto;
                border-top: 1px solid #eee;
            }
            .main-view { padding: 15px; overflow: visible; }
            .recipe-sheet { padding: 20px; margin-bottom: 80px; } /* Platz für Nav unten */
            .recipe-grid { grid-template-columns: 1fr; gap: 20px; }
            
            /* Nav Float etwas kleiner auf Mobile */
            #nav-float { width: 90%; justify-content: space-between; padding: 8px 15px; }
            #pageCount { font-size: 0.9em; }
        }

        @media print {
            .sidebar, .top-bar, #nav-float, .no-print { display: none !important; }
            body, .main-view { height: auto; overflow: visible; display: block; background: white; padding: 0; margin: 0; }
            .recipe-sheet { box-shadow: none; padding: 0; margin: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <div class="sidebar-header">
        <button class="btn-back" onclick="location.href='./rezepte.html'">
            <span>← Zurück zur Liste</span>
        </button>
    </div>
    <ul class="recipe-list" id="sidebarList">
        <li style="padding:20px; text-align:center; color:#999;">Lade Rezepte...</li>
    </ul>
</div>

<div class="main-view">
    <div class="top-bar no-print">
        <button class="btn-print" onclick="window.print()">
            <span>🖨️ Drucken / PDF</span>
        </button>
    </div>

    <div id="recipeContainer"></div>
</div>

<div id="nav-float" class="no-print" style="display:none">
    <button id="btnPrev">← Vorheriges</button>
    <span id="pageCount" style="font-weight:bold; color:#555;">1 / 1</span>
    <button id="btnNext">Nächstes →</button>
</div>

<div id="lb" class="lightbox" onclick="this.style.display='none'">
    <img id="lb-img" src="" alt="Vergrößerung">
</div>

<script src="./assets/js/util.js"></script> 
<script>
(async () => {
    const params = new URLSearchParams(window.location.search);
    const idParam = params.get('id');
    const container = document.getElementById('recipeContainer');
    
    if (!idParam) {
        container.innerHTML = "<p style='text-align:center; padding:50px; color:red;'>Keine Rezepte ausgewählt.</p>";
        document.getElementById('sidebarList').innerHTML = "";
        return;
    }

    const allIds = idParam.split(',').map(s => s.trim()).filter(Boolean);
    let currentIndex = 0;
    
    // Daten laden
    const allData = await window.$util.loadCsv('./assets/data/wdb_rezepte.csv');

    // Sidebar aufbauen
    const sidebarList = document.getElementById('sidebarList');
    sidebarList.innerHTML = allIds.map((bid, idx) => {
        const firstStep = allData.find(r => r.brot_id === bid);
        const name = firstStep ? (firstStep.name || bid) : bid;
        return `<li class="list-item" id="item-${idx}" onclick="showRecipe(${idx})">${name}</li>`;
    }).join('');

    // --- Core Function: Rezept anzeigen ---
    window.showRecipe = (index) => {
        if (index < 0 || index >= allIds.length) return;
        currentIndex = index;
        const breadId = allIds[index];
        const steps = allData.filter(r => r.brot_id === breadId);
        
        if (!steps.length) {
            container.innerHTML = `<div class="recipe-sheet"><p>Rezept ID ${breadId} nicht gefunden.</p></div>`;
            return;
        }

        // Sortieren & Header
        steps.sort((a, b) => parseInt(a.schritt_nr||0) - parseInt(b.schritt_nr||0));
        const main = steps[0];

        let html = `
            <div class="recipe-sheet">
                <div class="meta-info">
                    <span class="cat-tag">${main.atlas_ref_id || main.gruppe || 'Rezept'}</span>
                    <h1 class="recipe-title">${main.name || 'Unbenannt'}</h1>
                    <div style="color:#888; font-family:monospace;">ID: ${breadId}</div>
                </div>
        `;

        steps.forEach((s, i) => {
            let fullText = s.anweisung || '';
            let title = s.schritt_name || `Schritt ${s.schritt_nr || i+1}`;
            // Automatischer Titel Split wenn Doppelpunkt am Anfang
            const splitIdx = fullText.indexOf(':');
            if (splitIdx > -1 && splitIdx < 40 && !s.schritt_name) {
                title = fullText.substring(0, splitIdx).trim();
                fullText = fullText.substring(splitIdx + 1).trim();
            }

            html += `
                <div class="phase-section">
                    <div class="phase-title">${title}</div>
                    <div class="recipe-grid">
                        <div class="ing-box">
                            <h3 style="margin-top:0; font-size:1em; color:#888; border-bottom:1px solid #ddd; padding-bottom:5px;">Zutaten</h3>
                            <ul class="ing-list">${window.$util.formatIngredients(s.zutaten_list)}</ul>
                            ${s.zeit_aufwand ? `<div style="margin-top:15px; padding-top:10px; border-top:1px solid #eee; color:#666;">⏱ ${s.zeit_aufwand}</div>` : ''}
                        </div>
                        <div class="instruction-box">
                            <h3 style="margin-top:0; font-size:1em; color:#888; border-bottom:1px solid #ddd; padding-bottom:5px;">Anweisung</h3>
                            <div class="step-text">${fullText || '-'}</div>
                            <div style="margin-top:15px;">
                                ${window.$util.parsePipe(s.techniken_tags).map(t => `<span class="tech-badge">${t}</span>`).join('')}
                            </div>
                            ${s.bild_ref ? `<img src="./assets/image/${s.bild_ref}" onclick="openLightbox(this.src)" onerror="this.style.display='none'">` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        html += `</div>`; // End Sheet
        
        container.innerHTML = html;
        document.querySelector('.main-view').scrollTop = 0; // Nach oben scrollen

        updateNavState();
    };

    // --- UI Helpers ---
    function updateNavState() {
        // Sidebar Active Class
        document.querySelectorAll('.list-item').forEach(li => li.classList.remove('active'));
        const activeItem = document.getElementById(`item-${currentIndex}`);
        if(activeItem) {
            activeItem.classList.add('active');
            // Auf Mobile: sicherstellen, dass das aktive Element sichtbar ist, aber nicht scrollen wenn Desktop
            if(window.innerWidth < 900) {
                 activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Float Nav Update
        const nav = document.getElementById('nav-float');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const pageCount = document.getElementById('pageCount');

        if(allIds.length > 1) {
            nav.style.display = 'flex';
            pageCount.innerText = `${currentIndex + 1} / ${allIds.length}`;
            btnPrev.disabled = (currentIndex === 0);
            btnNext.disabled = (currentIndex === allIds.length - 1);
            
            btnPrev.onclick = () => showRecipe(currentIndex - 1);
            btnNext.onclick = () => showRecipe(currentIndex + 1);
        } else {
            nav.style.display = 'none';
        }
    }

    // Lightbox
    window.openLightbox = (src) => {
        document.getElementById('lb-img').src = src;
        document.getElementById('lb').style.display = 'flex';
    }

    // Init Start
    if(allIds.length > 0) showRecipe(0);
})();
</script>
</body>
</html>
